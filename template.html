<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<!-- le contenu se rafraîchit en xhr (musique 10 s, zones 60 s) ;
     rechargement complet toutes les 30 min par simple hygiène -->
<meta http-equiv="refresh" content="1800">
<title>la maison</title>
<style>
  /* écran maison · arcades · cible ipad 3, safari ios 9, 1024 x 768 */
  * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:#3a3835;
    font-family:"Avenir Next", "Avenir", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  #fit { position:absolute; top:0; left:0; }
  #stage {
    width:1024px; height:768px;
    position:relative; overflow:hidden;
    background:#f6f1e8; color:#35342d;
    -webkit-transform-origin:top left; transform-origin:top left;
  }

  /* ---------- tête ---------- */
  .head {
    position:absolute; top:52px; left:64px;
    font-size:14px; font-weight:600; letter-spacing:.4em;
    text-transform:uppercase; color:#a2947c;
  }
  .meteo {
    position:absolute; top:52px; right:64px; text-align:right;
    font-size:14px; font-weight:600; letter-spacing:.26em;
    text-transform:uppercase; color:#7c7361;
  }
  .meteo b { color:#b96f45; font-weight:600; }
  .meteo .mdetail {
    display:block; margin-top:6px; font-size:11px;
    letter-spacing:.18em; opacity:.75;
  }

  /* santé des sources : discret, visible seulement si une source est figée */
  .sante {
    position:absolute; top:74px; left:64px;
    font-size:10.5px; font-weight:600; letter-spacing:.22em;
    text-transform:uppercase; color:#b96f45; display:none;
  }
  .sante.on { display:block; }
  .sante:before {
    content:''; display:inline-block; width:6px; height:6px;
    border-radius:50%; background:#b96f45; margin-right:7px; vertical-align:middle;
  }
  .nuit .sante, .nuit .sante:before { color:#c98b60; background-color:#c98b60; }

  /* ---------- horloge ---------- */
  .clock {
    position:absolute; left:64px; top:126px;
    font-family:"Optima", "Avenir Next", sans-serif;
    font-size:124px; font-weight:500; line-height:1;
    color:#33322b; letter-spacing:.01em;
  }
  .date {
    position:absolute; left:68px; top:270px;
    font-family:Georgia, serif; font-style:italic;
    font-size:27px; color:#7c7361;
  }

  /* ---------- musique ---------- */
  .music {
    position:absolute; top:172px; right:64px;
    width:520px; height:118px;
    background:#35342d; color:#efe9dc;
    border-radius:59px;
    display:-webkit-flex; display:flex;
    -webkit-align-items:center; align-items:center;
    padding:0 16px 0 14px;
  }
  .music.off { display:none; }
  .vinyl {
    width:90px; height:90px; border-radius:50%;
    background:#26251f; border:1px solid #4a483e;
    position:relative; overflow:hidden;
  }
  .vinyl:before {
    content:''; position:absolute; left:50%; top:50%;
    width:58px; height:58px; margin:-29px 0 0 -29px;
    border-radius:50%; border:1px solid #4a483e;
  }
  .vinyl:after {
    content:''; position:absolute; left:50%; top:50%;
    width:26px; height:26px; margin:-13px 0 0 -13px;
    border-radius:50%; background:#b96f45;
  }
  #m-art {
    position:absolute; left:-1px; top:-1px;
    width:90px; height:90px; border-radius:50%;
    display:none; z-index:2;
  }
  .mtxt { -webkit-flex:1; flex:1; padding:0 16px; overflow:hidden; }
  .mtxt .t {
    font-size:19px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .mtxt .a {
    font-size:11.5px; font-weight:600; letter-spacing:.22em;
    text-transform:uppercase; opacity:.7; margin-top:5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .mbtn {
    display:block; width:54px; height:54px; border-radius:50%;
    border:1px solid #5a574a; margin-left:7px;
    position:relative; text-decoration:none;
  }
  .mbtn:active { background:#4a483e; }
  /* boutons volume, plus petits */
  .mvol {
    display:block; width:38px; height:38px; border-radius:50%;
    border:1px solid #5a574a; margin-left:7px;
    position:relative; text-decoration:none;
  }
  .mvol:active { background:#4a483e; }
  .ic-moins:before, .ic-plus:before, .ic-plus:after {
    content:''; position:absolute; background:#efe9dc; border-radius:2px;
  }
  .ic-moins:before { left:10px; top:17px; width:18px; height:4px; }
  .ic-plus:before { left:10px; top:17px; width:18px; height:4px; }
  .ic-plus:after { left:17px; top:10px; width:4px; height:18px; }
  .ic-pause:before, .ic-pause:after {
    content:''; position:absolute; top:17px; width:6px; height:20px;
    background:#efe9dc; border-radius:2px;
  }
  .ic-pause:before { left:19px; }
  .ic-pause:after { left:29px; }
  .ic-next:before {
    content:''; position:absolute; left:17px; top:17px;
    border-style:solid; border-width:10px 0 10px 14px;
    border-color:transparent transparent transparent #efe9dc;
  }
  .ic-next:after {
    content:''; position:absolute; left:33px; top:17px;
    width:4px; height:20px; background:#efe9dc; border-radius:2px;
  }
  .ic-prev:before {
    content:''; position:absolute; left:15px; top:17px;
    width:4px; height:20px; background:#efe9dc; border-radius:2px;
  }
  .ic-prev:after {
    content:''; position:absolute; left:21px; top:17px;
    border-style:solid; border-width:10px 14px 10px 0;
    border-color:transparent #efe9dc transparent transparent;
  }
  /* en pause : la capsule reste visible, tamisée, et le bouton devient lecture */
  .music.paused .vinyl, .music.paused .mtxt { opacity:.55; }
  .music.paused .ic-pause:before {
    left:20px; top:15px; width:0; height:0; background:none;
    border-style:solid; border-width:12px 0 12px 18px;
    border-color:transparent transparent transparent #efe9dc;
  }
  .music.paused .ic-pause:after { display:none; }

  /* ---------- pendentif yum.ines : petite arche renversée en haut ---------- */
  .pendentif {
    position:absolute; top:0; left:50%; width:240px; margin-left:-120px;
    height:140px; padding-top:28px;
    background:#b96f45; color:#f6f1e8;
    border-radius:0 0 120px 120px; text-align:center;
  }
  .pendentif.off { display:none; }
  .pendentif .p-num { font-size:25px; font-weight:600; margin:3px 0 2px; }
  .pendentif .p-lbl {
    font-size:10.5px; font-weight:600; letter-spacing:.2em;
    text-transform:uppercase; opacity:.85;
  }
  .nuit .pendentif { background:#96593a; color:#e8ddd1; }

  /* ---------- arcades ---------- */
  .arches {
    position:absolute; left:64px; right:64px; bottom:0;
    display:-webkit-flex; display:flex;
    -webkit-justify-content:space-between; justify-content:space-between;
    -webkit-align-items:flex-end; align-items:flex-end;
  }
  .arch {
    width:280px; height:436px;
    border-radius:140px 140px 0 0;
    padding:96px 34px 0;
    text-align:center;
  }
  .arch.centre { height:456px; padding-top:98px; }
  .arch.olive { background:#75815f; color:#f4f0e4; }
  .arch.sable { background:#e5d5bd; color:#4a463c; }
  .arch.terra { background:#b96f45; color:#f6f1e8; }
  .arch h3 {
    font-family:Georgia, serif; font-style:italic; font-weight:normal;
    font-size:24px; margin-bottom:18px;
  }
  .arch .it { padding:8px 0; font-size:18px; font-weight:600; line-height:1.3; }
  .arch .it small {
    display:block; font-size:11.5px; font-weight:600;
    letter-spacing:.22em; text-transform:uppercase;
    opacity:.85; margin-top:4px;
  }
  /* prochaine échéance mise en évidence : petit point d'accent sous l'item */
  .arch .it.next small { color:#f4e9d2; opacity:1; }
  .arch .it.next:after {
    content:''; display:block; width:5px; height:5px; border-radius:50%;
    background:#f4e9d2; margin:7px auto 0; opacity:.9;
  }
  .arch.sable .it.next small { color:#7a5334; }
  .arch.sable .it.next:after { background:#b96f45; }

  /* intertitre de la section basse de l'arche agenda */
  .arch .entete2 {
    margin:14px 0 2px; font-size:11.5px; font-weight:600;
    letter-spacing:.22em; text-transform:uppercase; opacity:.6;
  }
  .arch.olive { padding-top:78px; }
  /* ciné : titre aligné sur les autres arches, items resserrés pour 4 films */
  .arch.terra { padding-top:78px; }
  .arch.terra .it { padding:6px 0; }
  .arch.terra .it small { letter-spacing:.12em; }

  /* ---------- transitions douces (bascule jour ↔ nuit en fondu) ---------- */
  #stage, .arch, .head, .meteo, .clock, .date, .sante,
  .pendentif, .music, .vinyl, .vinyl:after, .arch .it small {
    -webkit-transition: background-color 1s ease, color 1s ease, border-color 1s ease;
    transition: background-color 1s ease, color 1s ease, border-color 1s ease;
  }
  /* zones rafraîchies en fondu léger */
  #z-auj, #z-venir, #z-sport, #z-cinema, #z-pend, #meteo {
    -webkit-transition: opacity .4s ease; transition: opacity .4s ease;
  }

  /* ---------- mode nuit (21 h à 7 h) ---------- */
  .nuit #stage { background:#2e2d28; color:#d8d2c4; }
  .nuit .head { color:#8a7f6b; }
  .nuit .meteo { color:#9b917d; }
  .nuit .meteo b { color:#c98b60; }
  .nuit .clock { color:#e8e2d3; }
  .nuit .date { color:#9b917d; }
  .nuit .arch.olive { background:#525c43; color:#ddd8c9; }
  .nuit .arch.sable { background:#a8977a; color:#2e2d28; }
  .nuit .arch.terra { background:#96593a; color:#e8ddd1; }
  .nuit .music { background:#26251f; border:1px solid #46443a; color:#d8d2c4; }
  .nuit .vinyl { background:#1c1b17; }
  .nuit .vinyl:after { background:#c98b60; }
</style>
</head>
<body>
<div id="fit">
  <div id="stage">

    <div class="head">la maison · lille</div>
    <div class="sante" id="sante"></div>

    <div class="meteo" id="meteo">{{METEO}}</div>

    <div class="pendentif {{PEND_CLASS}}" id="z-pend">{{STUDIO_ITEMS}}</div>

    <div class="music {{MUSIC_CLASS}}" id="music">
      <div class="vinyl">
        <img id="m-art" alt="" onload="artCharge(this)" onerror="artErreur(this)">
      </div>
      <div class="mtxt">
        <div class="t" id="m-title">{{MUSIC_TITLE}}</div>
        <div class="a" id="m-artist">{{MUSIC_ARTIST}}</div>
      </div>
      <a href="#" class="mvol ic-moins" onclick="return cmd('volume/moins')" aria-label="baisser le volume"></a>
      <a href="#" class="mvol ic-plus" onclick="return cmd('volume/plus')" aria-label="monter le volume"></a>
      <a href="#" class="mbtn ic-prev" onclick="return cmd('precedent')" aria-label="précédent"></a>
      <a href="#" class="mbtn ic-pause" onclick="return cmd('pause')" aria-label="lecture ou pause"></a>
      <a href="#" class="mbtn ic-next" onclick="return cmd('suivant')" aria-label="suivant"></a>
    </div>

    <div class="clock" id="clock">--:--</div>
    <div class="date" id="date">&nbsp;</div>

    <div class="arches">
      <div class="arch olive">
        <h3>aujourd'hui</h3>
        <div id="z-auj">{{AGENDA_AUJ}}</div>
        <div class="entete2">à venir</div>
        <div id="z-venir">{{AGENDA_VENIR}}</div>
      </div>
      <div class="arch sable centre">
        <h3>sport</h3>
        <div id="z-sport">{{SPORT_ITEMS}}</div>
      </div>
      <div class="arch terra">
        <h3>ciné</h3>
        <div id="z-cinema">{{CINEMA_ITEMS}}</div>
      </div>
    </div>

  </div>
</div>

<script>
  /* es5 uniquement · safari ios 9 · toutes les urls sont relatives
     (la page est servie sous le chemin secret, avec barre oblique finale) */

  // mise à l'échelle : 1:1 sur l'ipad, réduit proprement ailleurs
  function fit() {
    var s = Math.min(window.innerWidth / 1024, window.innerHeight / 768);
    if (s > 1) { s = 1; }
    var st = document.getElementById('stage');
    st.style.webkitTransform = 'scale(' + s + ')';
    st.style.transform = 'scale(' + s + ')';
    var f = document.getElementById('fit');
    f.style.width = (1024 * s) + 'px';
    f.style.height = (768 * s) + 'px';
    f.style.left = Math.max(0, (window.innerWidth - 1024 * s) / 2) + 'px';
    f.style.top = Math.max(0, (window.innerHeight - 768 * s) / 2) + 'px';
  }
  window.addEventListener('resize', fit);
  fit();

  // horloge, date, bascule jour / nuit
  var JOURS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  var MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  function pad(n) { return (n < 10 ? '0' : '') + n; }
  function tick() {
    var d = new Date();
    document.getElementById('clock').innerHTML = pad(d.getHours()) + ':' + pad(d.getMinutes());
    document.getElementById('date').innerHTML =
      JOURS[d.getDay()] + ' ' + d.getDate() + ' ' + MOIS[d.getMonth()];
    var h = d.getHours();
    var nuit = (h >= 21 || h < 7);
    document.body.className = nuit ? 'nuit' : '';
  }
  tick();
  setInterval(tick, 1000);

  // musique : commandes et rafraîchissement léger sans recharger la page
  var dernierTitre = '';
  function texte(id, v) { document.getElementById(id).innerHTML = v.replace(/</g, '&lt;'); }

  // teinte la capsule avec la couleur dominante de la pochette (canvas, côté client)
  function artCharge(img) { img.style.display = 'block'; teinterCapsule(img); }
  function artErreur(img) { img.style.display = 'none'; document.getElementById('music').style.background = ''; }
  function teinterCapsule(img) {
    try {
      var c = document.createElement('canvas'); c.width = 16; c.height = 16;
      var ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, 16, 16);
      var d = ctx.getImageData(0, 0, 16, 16).data, r = 0, g = 0, b = 0, n = 0;
      for (var i = 0; i < d.length; i += 4) { r += d[i]; g += d[i + 1]; b += d[i + 2]; n++; }
      // assombri (facteur .3) pour garder une capsule d'encre et un texte lisible
      var f = 0.3;
      document.getElementById('music').style.background =
        'rgb(' + Math.round(r / n * f) + ',' + Math.round(g / n * f) + ',' + Math.round(b / n * f) + ')';
    } catch (e) {}
  }

  function appliquerMusique(d) {
    var m = document.getElementById('music');
    // capsule masquée seulement quand rien n'est chargé ;
    // en pause elle reste visible avec un bouton lecture
    if (!d.title) { m.className = 'music off'; return; }
    m.className = d.playing ? 'music' : 'music paused';
    texte('m-title', d.title || '');
    texte('m-artist', d.artist || '');
    if (d.title !== dernierTitre) {
      dernierTitre = d.title;
      var img = document.getElementById('m-art');
      img.style.display = 'none';
      img.src = 'musique/pochette?' + (new Date()).getTime();
    }
  }
  function pollMusique() {
    try {
      var x = new XMLHttpRequest();
      // horodatage anti-cache : safari ios 9 recycle les xhr get sinon
      x.open('GET', 'musique/etat?' + (new Date()).getTime(), true);
      x.onreadystatechange = function () {
        if (x.readyState === 4 && x.status === 200) {
          try { appliquerMusique(JSON.parse(x.responseText)); } catch (e) {}
        }
      };
      x.send();
    } catch (e) {}
  }
  function cmd(action) {
    try {
      var x = new XMLHttpRequest();
      x.open('GET', 'musique/' + action, true);
      x.send();
    } catch (e) {}
    setTimeout(pollMusique, 600);
    return false;
  }
  // remplace une zone en fondu, seulement si le contenu a changé (pas de clignotement)
  var dernier = {}, premierContenu = true;
  function swap(id, html) {
    if (dernier[id] === html) return;
    dernier[id] = html;
    var el = document.getElementById(id);
    if (!el) return;
    if (premierContenu) { el.innerHTML = html; return; }
    el.style.opacity = '0';
    setTimeout(function () { el.innerHTML = html; el.style.opacity = '1'; }, 400);
  }
  function majSante(figees) {
    var el = document.getElementById('sante');
    if (figees && figees.length) {
      el.innerHTML = 'données figées · ' + figees.join(', ');
      el.className = 'sante on';
    } else { el.className = 'sante'; }
  }

  // zones de contenu (météo, agenda, sport, ciné, studio) sans recharger la page
  function pollContenu() {
    try {
      var x = new XMLHttpRequest();
      x.open('GET', 'contenu?' + (new Date()).getTime(), true);
      x.onreadystatechange = function () {
        if (x.readyState === 4 && x.status === 200) {
          try {
            var d = JSON.parse(x.responseText);
            swap('meteo', d.meteo);
            swap('z-auj', d.agendaAuj);
            swap('z-venir', d.agendaVenir);
            swap('z-sport', d.sport);
            swap('z-cinema', d.cinema);
            var pend = document.getElementById('z-pend');
            if (dernier['z-pend'] !== d.studio) {
              dernier['z-pend'] = d.studio;
              pend.innerHTML = d.studio;
              pend.className = d.studio ? 'pendentif' : 'pendentif off';
            }
            majSante(d.figees);
            premierContenu = false;
          } catch (e) {}
        }
      };
      x.send();
    } catch (e) {}
  }

  setTimeout(pollMusique, 500);
  setInterval(pollMusique, 2000);
  setTimeout(pollContenu, 2000);
  setInterval(pollContenu, 60000);

  // filet de sécurité : en mode plein écran ios 9, le meta refresh est
  // parfois capricieux ; on force aussi le rechargement complet en js
  setTimeout(function () { window.location.reload(true); }, 1800000);
</script>
</body>
</html>
